name: Build and Deploy

on:
  push:
    branches: [main, feat/storage-replica]

env:
  IMAGE_NAME: ghcr.io/dudenest/dudenest
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          channel: stable  # font_awesome_flutter removed 2026-05-19, so we no longer need the 3.27.x pin that was blocking Dart 3 strict; latest stable is now fine
      - run: flutter pub get
      - name: Run tests
        run: flutter test

  build:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          channel: stable  # font_awesome_flutter removed 2026-05-19, so we no longer need the 3.27.x pin that was blocking Dart 3 strict; latest stable is now fine

      - run: flutter pub get

      - name: Build Flutter web
        run: |
          VERSION="sha-$(echo "$GITHUB_SHA" | cut -c1-7)"
          echo "APP_VERSION=$VERSION"
          # --no-tree-shake-icons: ships full MaterialIcons font (~150KB instead of ~13KB tree-shaken).
          # Tree-shaker has been observed (2026-05-19) to omit codepoints for icons whose numeric value
          # was changed in newer Material Icons revisions (e.g. Icons.photo_library moved from 0xE413
          # → 0xE4BA; Icons.tune from 0xE429 → 0xE683). The shaker uses a stale codepoint map and the
          # rendered glyph ends up missing from the bundled font even though the Dart code references
          # the icon. Bundle bloat is negligible vs. the user-visible "blank icon" regression.
          flutter build web --release --pwa-strategy none --no-tree-shake-icons "--dart-define=APP_VERSION=$VERSION"

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest

  deploy:
    needs: build
    runs-on: [self-hosted, netol-swarm]
    steps:
      - uses: actions/checkout@v6

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Mirror to registry.netol.io (s332 — eliminates ghcr SPOF at Swarm runtime)
        env:
          REGISTRY_NETOL_TOKEN: ${{ secrets.GITLAB_NETOL_IO_TOKEN }}
          REGISTRY_NETOL_USER: ${{ secrets.GITLAB_NETOL_IO_USER }}
          MIRROR_NAME: dudenest/dudenest
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker pull ${{ env.IMAGE_NAME }}:${IMAGE_TAG}
          echo "$REGISTRY_NETOL_TOKEN" | docker login registry.netol.io -u "$REGISTRY_NETOL_USER" --password-stdin
          docker tag ${{ env.IMAGE_NAME }}:${IMAGE_TAG} registry.netol.io/${MIRROR_NAME}:${IMAGE_TAG}
          docker tag ${{ env.IMAGE_NAME }}:${IMAGE_TAG} registry.netol.io/${MIRROR_NAME}:latest
          docker push registry.netol.io/${MIRROR_NAME}:${IMAGE_TAG}
          docker push registry.netol.io/${MIRROR_NAME}:latest
          echo "✅ mirrored to registry.netol.io/${MIRROR_NAME}:${IMAGE_TAG}"

      - name: Deploy to Docker Swarm
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_TAG=$IMAGE_TAG docker stack deploy \
            --compose-file docker/web/docker-stack.yml \
            --with-registry-auth \
            --resolve-image always \
            dudenest-web

      - name: Verify
        run: |
          sleep 5
          docker service ps dudenest-web_web --no-trunc | head -10

      - name: Purge Cloudflare cache
        run: |
          curl -s -X POST "https://api.cloudflare.com/client/v4/zones/${{ secrets.CF_ZONE_ID }}/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{"files":["https://app.dudenest.com/main.dart.js","https://app.dudenest.com/index.html","https://app.dudenest.com/flutter_bootstrap.js","https://app.dudenest.com/flutter.js"]}' \
            | grep -o '"success":[a-z]*'
