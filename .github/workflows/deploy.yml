name: Build and Deploy

on:
  push:
    branches: [main, feat/storage-replica]

env:
  IMAGE_NAME: ghcr.io/dudenest/dudenest
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'  # Dart 3.6.x — last stable where font_awesome_flutter (10.x) compiles; newer Flutter enforces final classes strictly and IconData can no longer be extended
          channel: stable
      - run: flutter pub get
      - name: Run tests
        run: flutter test

  build:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'  # Dart 3.6.x — last stable where font_awesome_flutter (10.x) compiles; newer Flutter enforces final classes strictly and IconData can no longer be extended
          channel: stable

      - run: flutter pub get

      - name: Build Flutter web
        run: |
          VERSION="sha-$(echo "$GITHUB_SHA" | cut -c1-7)"
          echo "APP_VERSION=$VERSION"
          flutter build web --release --pwa-strategy none "--dart-define=APP_VERSION=$VERSION"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest

  deploy:
    needs: build
    runs-on: [self-hosted, netol-swarm]
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Deploy to Docker Swarm
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_TAG=$IMAGE_TAG docker stack deploy \
            --compose-file docker/web/docker-stack.yml \
            --with-registry-auth \
            --resolve-image always \
            dudenest-web

      - name: Verify
        run: |
          sleep 5
          docker service ps dudenest-web_web --no-trunc | head -10

      - name: Purge Cloudflare cache
        run: |
          curl -s -X POST "https://api.cloudflare.com/client/v4/zones/${{ secrets.CF_ZONE_ID }}/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{"files":["https://app.dudenest.com/main.dart.js","https://app.dudenest.com/index.html","https://app.dudenest.com/flutter_bootstrap.js","https://app.dudenest.com/flutter.js"]}' \
            | grep -o '"success":[a-z]*'
