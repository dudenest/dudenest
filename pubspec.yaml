name: dudenest
description: Private cloud storage — encrypted, erasure-coded, multi-provider.
publish_to: 'none'
version: 0.7.1+2

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  file_picker: ^8.0.0
  shared_preferences: ^2.5.5
  web: ^1.1.0
  flutter_web_auth_2: ^4.0.0   # OAuth in system browser (user's IP ✅) — Android/iOS/macOS/Desktop
  webview_flutter: ^4.0.0      # In-app WebView with JS auto-fill (Method E) — Android/iOS/macOS/Desktop only
  web_socket_channel: ^3.0.0   # WebSocket client for relay↔Flutter communication
  pinenacl: ^0.6.0             # NaCl sealed_box — E2E-seal method-3 credentials to relay session pubkey (§10.1)
  url_launcher: ^6.3.0         # Open URLs in system browser (fallback / web platform)
  # font_awesome_flutter REMOVED 2026-05-19 — every 10.x release extends final `IconData`, which
  # strict Dart 3 (Flutter ≥ 3.28) rejects with "can't be extended outside its library". Brand
  # icons in login_screen.dart and main.dart now use Material `Icons.*` glyphs.
  fl_chart: ^1.2.0
  graphic: ^2.7.0
  logger: ^2.7.0
  flutter_staggered_grid_view: ^0.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  network_image_mock: ^2.1.1
  build_runner: ^2.13.1
  json_serializable: ^6.13.1

flutter:
  uses-material-design: true
