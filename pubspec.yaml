name: dudenest
description: Private cloud storage — encrypted, erasure-coded, multi-provider.
publish_to: 'none'
version: 0.3.0+3

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  file_picker: ^8.0.0
  shared_preferences: ^2.3.0
  web: ^1.1.0
  flutter_web_auth_2: ^4.0.0   # OAuth in system browser (user's IP ✅) — Android/iOS/macOS/Desktop
  webview_flutter: ^4.0.0      # In-app WebView with JS auto-fill (Method E) — Android/iOS/macOS/Desktop only
  web_socket_channel: ^3.0.0   # WebSocket client for relay↔Flutter communication
  url_launcher: ^6.3.0         # Open URLs in system browser (fallback / web platform)
  font_awesome_flutter: ^10.7.0  # Brand icons: GitHub, Discord, YouTube, Facebook, X

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  network_image_mock: ^2.1.1

flutter:
  uses-material-design: true
