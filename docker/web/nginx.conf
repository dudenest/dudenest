server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;
    gzip on;
    gzip_types text/plain text/css application/javascript application/json application/wasm;

    # Files without content hash — always revalidate (CDN bypass too)
    location ~* ^/(index\.html|flutter_bootstrap\.js|flutter\.js|main\.dart\.js|flutter_service_worker\.js|manifest\.json)$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Cloudflare-CDN-Cache-Control "no-store";  # Cloudflare respects this header
        add_header Pragma "no-cache";
        expires -1;
        try_files $uri /index.html;
    }

    # Assets with content hash (canvaskit, fonts, images) — safe to cache long-term
    location ~* \.(wasm|png|jpg|jpeg|gif|ico|ttf|otf|woff|woff2)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Flutter SPA routing fallback
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}
